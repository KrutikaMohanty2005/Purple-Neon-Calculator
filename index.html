<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7b2cbf">
    <meta name="description" content="Purple Neon Calculator">
    <title>Krutika Calculator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
    <style>
*{margin:0;padding:0;box-sizing:border-box}
[data-theme="purple"]{--primary:#7b2cbf;--primary-hover:#9d4edd;--glow:rgba(178,102,255,0.4);--glow-soft:rgba(178,102,255,0.2);--accent:#c77dff;--accent-hover:#e0aaff;--bg-start:#0f0f0f;--bg-mid:#1a1a1a;--bg-end:#2d0b52;--clear:#560bad;--clear-hover:#7209b7}
[data-theme="blue"]{--primary:#1565c0;--primary-hover:#1e88e5;--glow:rgba(66,165,245,0.4);--glow-soft:rgba(66,165,245,0.2);--accent:#42a5f5;--accent-hover:#90caf9;--bg-start:#0a0a1a;--bg-mid:#0d1b2a;--bg-end:#0a1929;--clear:#0d47a1;--clear-hover:#1565c0}
[data-theme="green"]{--primary:#2e7d32;--primary-hover:#43a047;--glow:rgba(102,187,106,0.4);--glow-soft:rgba(102,187,106,0.2);--accent:#66bb6a;--accent-hover:#a5d6a7;--bg-start:#0a0f0a;--bg-mid:#0d1a0d;--bg-end:#0b200b;--clear:#1b5e20;--clear-hover:#2e7d32}
[data-theme="pink"]{--primary:#d81b60;--primary-hover:#e91e63;--glow:rgba(236,64,122,0.4);--glow-soft:rgba(236,64,122,0.2);--accent:#f06292;--accent-hover:#f8bbd0;--bg-start:#1a0a0f;--bg-mid:#1a0d14;--bg-end:#2d0b1a;--clear:#880e4f;--clear-hover:#ad1457}
[data-theme="red"]{--primary:#c62828;--primary-hover:#e53935;--glow:rgba(239,83,80,0.4);--glow-soft:rgba(239,83,80,0.2);--accent:#ef5350;--accent-hover:#ef9a9a;--bg-start:#1a0a0a;--bg-mid:#1a0d0d;--bg-end:#2d0b0b;--clear:#b71c1c;--clear-hover:#c62828}
body{font-family:'Segoe UI',sans-serif;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,var(--bg-start),var(--bg-mid),var(--bg-end));transition:background .5s}
.app{display:flex;gap:10px;align-items:flex-start}
.calculator{background:rgba(20,20,20,.95);padding:14px;border-radius:18px;border:1px solid var(--glow-soft);box-shadow:0 0 15px var(--glow),0 0 40px var(--glow-soft);animation:fadeIn .5s;transition:border-color .4s,box-shadow .4s;width:280px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.header{display:flex;justify-content:space-between;align-items:center}
h1{color:var(--accent);margin-bottom:2px;font-size:16px;transition:color .4s}
.header-actions{display:flex;gap:4px}
.icon-btn{background:none;border:1px solid var(--glow-soft);color:var(--accent);font-size:11px;width:26px;height:26px;border-radius:7px;cursor:pointer;transition:.3s}
.icon-btn:hover{background:var(--glow-soft);transform:scale(1.1)}
.author{text-align:center;color:var(--primary);margin-bottom:6px;font-size:10px;transition:color .4s}
.theme-picker{display:none;justify-content:center;gap:7px;margin-bottom:8px;animation:slideDown .3s}
.theme-picker.open{display:flex}
.theme-dot{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.3s}
.theme-dot.purple{background:#7b2cbf}.theme-dot.blue{background:#1565c0}.theme-dot.green{background:#2e7d32}.theme-dot.pink{background:#d81b60}.theme-dot.red{background:#c62828}
.theme-dot:hover{transform:scale(1.2)}.theme-dot.active{border-color:white;box-shadow:0 0 10px var(--glow)}
.scientific-panel{display:none;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px;animation:slideDown .3s}
.scientific-panel.open{display:grid}
.scientific-panel button{height:28px;border:none;border-radius:7px;font-size:10px;cursor:pointer;background:rgba(178,102,255,.15);color:var(--accent);transition:.2s}
.scientific-panel button:hover{background:var(--primary);color:white;transform:translateY(-2px)}
.currency-panel{display:none;gap:5px;margin-bottom:8px;padding:8px;background:rgba(255,255,255,.03);border-radius:10px;animation:slideDown .3s}
.currency-panel.open{display:flex;flex-direction:column}
.currency-row{display:flex;gap:5px}
.currency-row input,.currency-row select{height:28px;border:none;border-radius:7px;padding:0 7px;font-size:11px;outline:none;transition:.3s}
.currency-row input{flex:1;min-width:0;background:#111;color:white;text-align:right}
.currency-row input::placeholder{color:#555}
.currency-row select{width:58px;background:rgba(178,102,255,.15);color:var(--accent);cursor:pointer;font-weight:bold;font-size:10px;-webkit-appearance:none;appearance:none;text-align:center}
.swap-btn{align-self:center;width:22px;height:22px;border-radius:50%;font-size:11px;background:var(--primary);color:white}
.swap-btn:hover{background:var(--primary-hover);transform:rotate(180deg)}
.convert-btn{height:28px;width:28px;border:none;border-radius:7px;font-size:13px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--primary));color:black;transition:.3s;flex-shrink:0}
.rate-info{text-align:center;color:#444;font-size:9px}
#display{width:100%;height:48px;border:none;outline:none;border-radius:10px;margin-bottom:10px;text-align:right;padding:8px 12px;font-size:22px;background:#111;color:white;caret-color:transparent;cursor:pointer;box-shadow:inset 0 0 10px var(--glow-soft);transition:box-shadow .3s}
#display:hover{box-shadow:inset 0 0 15px var(--glow)}
#display::placeholder{color:#444}
.buttons{display:grid;grid-template-columns:repeat(4,60px);gap:7px}
button{height:46px;border:none;border-radius:10px;font-size:15px;cursor:pointer;background:#1f1f1f;color:white;transition:all .2s;user-select:none}
button:hover{transform:translateY(-3px);box-shadow:0 5px 15px rgba(0,0,0,.3)}
button:active{transform:scale(.95)}
.operator{background:var(--primary)}.operator:hover{background:var(--primary-hover)}
.clear{background:var(--clear)}.clear:hover{background:var(--clear-hover)}
.equal{background:linear-gradient(135deg,var(--accent),var(--primary));color:black;font-weight:bold}
.equal:hover{background:linear-gradient(135deg,var(--accent-hover),var(--accent))}
.keyboard-hint{text-align:center;color:#555;font-size:9px;margin-top:8px}
.history-panel{background:rgba(20,20,20,.95);padding:12px;border-radius:14px;border:1px solid var(--glow-soft);width:180px;max-height:380px;display:flex;flex-direction:column;box-shadow:0 0 15px var(--glow-soft);animation:fadeIn .5s;transition:border-color .4s,box-shadow .4s}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.history-header h2{color:var(--accent);font-size:14px;transition:color .4s}
.clear-history{background:none;border:1px solid var(--glow-soft);color:var(--primary);font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;transition:.3s;height:auto}
.clear-history:hover{background:var(--glow-soft)}
.history-list{overflow-y:auto;flex:1;max-height:330px}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
.history-item{padding:6px 8px;border-radius:7px;margin-bottom:4px;background:var(--glow-soft);cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:1px}
.history-item:hover{background:var(--glow);transform:translateX(3px)}
.history-expr{color:#888;font-size:10px}
.history-result{color:var(--accent);font-size:12px;font-weight:bold;transition:color .4s}
.empty{color:#444;text-align:center;font-size:11px;margin-top:25px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:7px 18px;border-radius:18px;font-size:12px;opacity:0;pointer-events:none;transition:all .3s;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.app{flex-direction:column;align-items:center}.calculator{width:260px;padding:12px}.buttons{grid-template-columns:repeat(4,56px);gap:5px}button{height:42px;font-size:14px}#display{height:44px;font-size:20px}.history-panel{width:260px;max-height:160px;display:none}.history-panel.open{display:flex;animation:slideUp .3s}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.history-list{max-height:90px}.scientific-panel{gap:3px}.scientific-panel button{height:24px;font-size:9px}}
    </style>
</head>
<body data-theme="purple">
    <div class="app">
        <div class="calculator">
            <div class="header">
                <h1 id="modeTitle">CALCULATOR</h1>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleCurrency()" title="Currency Converter">&#36;</button>
                    <button class="icon-btn" onclick="toggleTheme()" title="Change Theme">&#127912;</button>
                    <button class="icon-btn" onclick="toggleScientific()" title="Scientific Mode">&#130;f(x)</button>
                    <button class="icon-btn" onclick="toggleHistory()" title="History">&#128337;</button>
                </div>
            </div>
            <p class="author">Created by Krutika Mohanty</p>
            <div class="theme-picker" id="themePicker">
                <button class="theme-dot purple active" onclick="setTheme('purple')"></button>
                <button class="theme-dot blue" onclick="setTheme('blue')"></button>
                <button class="theme-dot green" onclick="setTheme('green')"></button>
                <button class="theme-dot pink" onclick="setTheme('pink')"></button>
                <button class="theme-dot red" onclick="setTheme('red')"></button>
            </div>
            <div class="scientific-panel" id="scientificPanel">
                <button onclick="appendValue('sin(')">sin</button>
                <button onclick="appendValue('cos(')">cos</button>
                <button onclick="appendValue('tan(')">tan</button>
                <button onclick="appendValue('Math.log(')">ln</button>
                <button onclick="appendValue('Math.log10(')">log</button>
                <button onclick="appendValue('Math.sqrt(')">&#8730;</button>
                <button onclick="appendValue('Math.pow(')">x^y</button>
                <button onclick="appendValue('Math.PI')">&#960;</button>
                <button onclick="appendValue('Math.E')">e</button>
                <button onclick="appendValue('**')">^</button>
            </div>
            <div class="currency-panel" id="currencyPanel">
                <div class="currency-row">
                    <input type="number" id="currencyAmount" placeholder="Amount" value="1">
                    <select id="currencyFrom">
                        <option value="USD">USD</option><option value="INR" selected>INR</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="JPY">JPY</option><option value="CAD">CAD</option><option value="AUD">AUD</option><option value="CNY">CNY</option><option value="KRW">KRW</option><option value="AED">AED</option><option value="SAR">SAR</option><option value="SGD">SGD</option><option value="CHF">CHF</option><option value="NZD">NZD</option>
                    </select>
                    <button class="convert-btn" onclick="convertCurrency()">=</button>
                </div>
                <button class="swap-btn" onclick="swapCurrencies()">&#8645;</button>
                <div class="currency-row">
                    <input type="text" id="currencyResult" readonly placeholder="Result">
                    <select id="currencyTo">
                        <option value="USD" selected>USD</option><option value="INR">INR</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="JPY">JPY</option><option value="CAD">CAD</option><option value="AUD">AUD</option><option value="CNY">CNY</option><option value="KRW">KRW</option><option value="AED">AED</option><option value="SAR">SAR</option><option value="SGD">SGD</option><option value="CHF">CHF</option><option value="NZD">NZD</option>
                    </select>
                </div>
                <p class="rate-info" id="rateInfo">Rates update automatically</p>
            </div>
            <input type="text" id="display" readonly placeholder="0" onclick="copyResult()">
            <div class="buttons">
                <button class="clear" onclick="allClear()">AC</button>
                <button class="clear" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="appendValue('%')">%</button>
                <button class="operator" onclick="appendValue('/')">&#247;</button>
                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button class="operator" onclick="appendValue('*')">&#215;</button>
                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button class="operator" onclick="appendValue('-')">&#8722;</button>
                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button class="operator" onclick="appendValue('+')">+</button>
                <button onclick="appendValue('00')">00</button>
                <button onclick="appendValue('0')">0</button>
                <button onclick="appendValue('.')">.</button>
                <button class="equal" onclick="calculate()">=</button>
            </div>
            <p class="keyboard-hint">Keyboard supported | Tap display to copy</p>
        </div>
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <h2>History</h2>
                <button class="clear-history" onclick="clearHistory()">Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <p class="empty">No calculations yet</p>
            </div>
        </div>
    </div>
    <div class="toast" id="toast">Copied!</div>
    <script src="script.js"></script>
</body>
</html>
